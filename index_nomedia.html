<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook API Client — No Media</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container_up">
        <h1>Facebook API Client (No Media)</h1>
        <div class="form-group">
            <label for="apiSelect">Select API:</label>
            <select id="apiSelect">
                <option value="get_list_fb_user_photos">get_list_fb_user_photos</option>
                <option value="get_list_fb_user_reels">get_list_fb_user_reels</option>
                <option value="get_list_fb_highlights">get_list_fb_highlights</option>
                <option value="get_list_ig_post">get_list_ig_post</option>
                <option value="get_list_ig_user_stories">get_list_ig_user_stories</option>
            </select>
        </div>
        <div class="form-group">
            <label for="apiParams">API Parameters (JSON):</label>
            <textarea id="apiParams" rows="6">{
                "url": "https://www.facebook.com/trang.quach.526875",
                "type": "5",
                "cursor": ""
            }
            </textarea>
            <small>Nhập nhiều URL Facebook/Instagram, mỗi dòng 1 URL hoặc cách nhau bằng dấu phẩy (ví dụ: "url": "url1,url2,...")</small>
        </div>
        <button id="makeApiCallBtn">Make API Call</button>
        <button id="downloadAllBtn" style="display: none; margin-top: 20px;">Tải về tất cả ảnh và chú thích</button>

        <!-- Progress bars -->
        <div id="download-progress-container" style="display:none;">
            <div id="download-progress-bar"></div>
            <span id="download-progress-text"></span>
        </div>
        <div id="download-item-progress-container" style="display:none;">
            <div id="download-item-progress-bar"></div>
            <span id="download-item-progress-text"></span>
        </div>

        <!-- Status & per-URL progress -->
        <div id="overall-status" class="status-message"></div>
        <div id="multi-url-progress"></div>
    </div>
    <div class="container_down">
        <div id="results">Results will appear here...</div>
    </div>

    <!-- Import map to override './ui.js' used by main.js with a no-media variant -->
    <script type="importmap">
    {
      "imports": {
        "./ui.js": "./public/js/ui.no-media.js"
      }
    }
    </script>

    <!-- NOTE: If your project keeps JS under public/js/, change src to "public/js/main.js" -->
    <script type="module" src="./public/js/main.js"></script>
</body>
</html>
